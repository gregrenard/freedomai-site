<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Page not found — Freedom.AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#FBF9F4; --surface:#FFFFFF; --ink:#1A1814; --muted:#6F685B; --line:#E7E1D5; --accent:#A9791F; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased;
         font-family:'Spectral', Georgia, serif;
         display:flex; align-items:center; justify-content:center; padding:2rem; text-align:center; line-height:1.6; }
  .wrap { max-width:560px; }
  .code { font-size:.78rem; letter-spacing:.24em; text-transform:uppercase; color:var(--accent);
          margin-bottom:1.1rem; font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; }
  h1 { font-size:2rem; margin:0 0 .75rem; font-weight:600; letter-spacing:-0.01em; }
  p { color:var(--muted); margin:0 0 1.75rem; }
  nav a { color:var(--ink); text-decoration:none; border:1px solid var(--line); border-radius:2px;
          padding:.5rem 1rem; margin:.25rem; display:inline-block; font-size:.95rem; transition:.15s;
          font-family:'Helvetica Neue', Helvetica, Arial, sans-serif; }
  nav a:hover { border-color:var(--accent); color:var(--accent); }
  .home { margin-top:1.75rem; }
  .home a { color:var(--accent); text-decoration:none; font-weight:600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="code">404 — Page not found</div>
    <h1>This page doesn't exist</h1>
    <p>The page you're looking for may have moved. Try one of the sections below.</p>
    <nav>
      <a href="/advisory-execution">Advisory &amp; Execution</a>
      <a href="/ai-lab">AI Lab</a>
      <a href="/brand">Brand</a>
    </nav>
    <div class="home"><a href="/">← Back to www.freedom.ai</a></div>
  </div>
</body>
</html>
